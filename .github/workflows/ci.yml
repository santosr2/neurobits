name: CI

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/ci.yml'

# Allow one concurrent deployment
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-wrapper:
    name: Test Python Wrapper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  build:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    needs: test-wrapper

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --source site --minify --cleanDestinationDir

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/public
          retention-days: 1

  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site/public

      - name: Install lychee
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x lychee
          sudo mv lychee /usr/local/bin/

      - name: Check links
        run: |
          lychee \
            --offline \
            --no-progress \
            --root-dir ${{ github.workspace }}/site/public \
            --exclude-path 'site/public/index.xml' \
            --exclude-path 'site/public/sitemap.xml' \
            'site/public/**/*.html'

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: [build, link-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site/public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
